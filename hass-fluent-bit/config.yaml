---
name: FluentBit
version: "2026.04.13"
slug: fluent_bit
description: "Fluent-Bit log shipping"

arch:
  - aarch64
  - amd64

init: false
startup: services
journald: true

map:
  - addon_config

options:
  config_file: fluent_bit.conf

ports:
  2020/tcp: 2020
  514/udp: 514

schema:
  config_file: str

# Build base images per-architecture
build_from:
  aarch64: ghcr.io/hassio-addons/debian-base:7.6.2
  amd64: ghcr.io/hassio-addons/debian-base:7.6.2
